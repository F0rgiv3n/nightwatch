# What Nightwatch watches: earthquakes in the Greece area.
# The ntfy topic is read from the NTFY_TOPIC environment variable.

interval: 300   # seconds between checks (300 = every 5 minutes)

sources:
  # Renamed from the old USGS source: a new name makes Nightwatch save a fresh
  # silent baseline instead of treating every NOA id as "new" on the switch.
  - name: greece-earthquakes-noa
    type: noa               # National Observatory of Athens (best source for Greece)
    min_magnitude: 3.0      # only notify for magnitude 3.0 and above (Richter / ML)
    period_days: 1          # look at the last 24 hours

    # Bounding box around Greece (latitude / longitude).
    # Covers the mainland, the Aegean and the islands.
    min_latitude: 34.0
    max_latitude: 42.0
    min_longitude: 19.0
    max_longitude: 29.5
