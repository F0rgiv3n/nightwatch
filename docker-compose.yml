services:
  sentinel:
    build: .
    image: sentinel:latest
    container_name: sentinel
    restart: unless-stopped

    # Secrets (NTFY_TOPIC, etc.) come from .env — never bake them into the image.
    env_file:
      - .env

    volumes:
      # Your real config, mounted read-only.
      - ./config.yaml:/app/config.yaml:ro
      # Persistent history + heartbeat survive restarts and image rebuilds.
      - sentinel-data:/app/data

    # Modest, predictable footprint — fine for a free-tier box.
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sentinel-data:
