# ---------------------------------------------------------------------------
# Sentinel configuration
#
# Copy to config.yaml and edit. ${VAR} placeholders are filled from the
# environment at load time (see .env.example), so no secrets live in this file.
# ${VAR:-fallback} provides a default.
# ---------------------------------------------------------------------------

# How Sentinel identifies itself to every server it contacts. Be honest:
# include a contact/URL so site operators can reach you.
user_agent: "Sentinel/0.1 (+https://github.com/yourname/sentinel)"

# Where history (seen items + conditional-GET cursors) is persisted.
database: data/sentinel.db

# Touched after every poll cycle; the Docker healthcheck watches its age.
heartbeat_file: data/heartbeat

# Default polling interval (seconds); per-source `interval:` overrides it.
default_interval: 300

# Don't alert on the very first run — record a baseline silently instead.
notify_on_first_run: false

# --- Notifications ---------------------------------------------------------
notify:
  type: ntfy
  topic: "${NTFY_TOPIC}"
  server: "${NTFY_SERVER:-https://ntfy.sh}"
  # Only needed for protected / self-hosted topics:
  username: "${NTFY_USER:-}"
  password: "${NTFY_PASS:-}"

# --- Sources ---------------------------------------------------------------
sources:
  # Real-time significant earthquakes from the USGS public GeoJSON feed.
  - name: big-earthquakes
    type: usgs_earthquakes
    feed: "4.5_day"        # all magnitude 4.5+ in the past 24h
    min_magnitude: 5.0     # ...but only alert me on M5.0+
    interval: 600

  # New releases of a GitHub project (official API, ETag-conditional).
  # Pick a repo that actually uses GitHub Releases (many don't).
  - name: ruff-releases
    type: github_releases
    repo: astral-sh/ruff
    interval: 3600

  # Hacker News stories matching a keyword (official Algolia search API).
  - name: hn-rust
    type: hackernews
    query: rust
    limit: 30
    interval: 600

  # Any RSS/Atom feed — here, the HN front page mirror.
  - name: hn-frontpage
    type: rss
    url: https://hnrss.org/frontpage
    interval: 900
